<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Трекер привычек</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1 class="app-title">Мои привычки</h1>
    <div class="app-controls">
      <button id="resetStatsBtn" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Сбросить
      </button>
      <button id="exportCsvBtn" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Экспорт
      </button>
      <button id="themeToggle" class="btn btn-icon">🌙</button>
    </div>
  </div>

  <div class="main-container">
    <div class="calendar-wrapper">
      <div class="calendar">
        <div class="calendar_header">
          <div class="calendar_month" id="month-year"></div>
          <div class="calendar_btns">
            <button type="button" class="calendar_btn" id="prev-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button type="button" class="calendar_btn" id="next-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <div class="calendar_body">
          <div class="calendar_day-names"></div>
          <div class="calendar_days" id="calendar-days"></div>
        </div>
      </div>
    </div>

    <div class="habits-wrapper">
      <ul id="habitsList"></ul>
      <div class="stats-section">
        <div class="stats-header">
          <h3>Статистика активности</h3>
          <div class="stats-tabs">
            <button class="stats-tab active" data-period="week">Неделя</button>
            <button class="stats-tab" data-period="month">Месяц</button>
            <button class="stats-tab" data-period="year">Год</button>
          </div>
        </div>
        <div id="statsChart" class="stats-chart"></div>
      </div>
      <div id="topHabits" class="top-habits"></div>
    </div>
  </div>
</div>

<!-- Оверлей -->
<div id="overlay"></div>

<!-- Попап добавления привычки -->
<div id="popup">
  <button id="closePopup" class="popup-close">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <h3 class="popup-title">Новая привычка</h3>
  <div class="inputContainer">
    <div class="input-group">
      <label for="habitName">Название</label>
      <input type="text" id="habitName" placeholder="Например: Чтение книги" maxlength="50" required>
    </div>
    <div class="input-group">
      <label for="habitTime">Время выполнения</label>
      <input type="time" id="habitTime">
    </div>
    <div class="input-group">
      <label>Повторять</label>
      <div class="schedule-row">
        <select id="repeatType">
          <option value="once">Один раз</option>
          <option value="daily">Каждый день</option>
          <option value="weekly">Еженедельно</option>
          <option value="custom">Выбрать дни</option>
          <option value="interval">Каждые N дней</option>
        </select>
      </div>
    </div>
    <div class="input-group" id="intervalGroup" style="display:none;">
      <label>Интервал</label>
      <div class="interval-row">
        <input type="number" id="intervalValue" min="1" max="365" value="2" class="interval-input">
        <select id="intervalUnit">
          <option value="days">дней</option>
          <option value="weeks">недель</option>
          <option value="months">месяцев</option>
        </select>
      </div>
    </div>
    <div class="input-group" id="weekdaysGroup" style="display:none;">
      <label>Дни недели</label>
      <div class="weekdays-selector">
        <label class="weekday-chip"><input type="checkbox" value="1"><span>Пн</span></label>
        <label class="weekday-chip"><input type="checkbox" value="2"><span>Вт</span></label>
        <label class="weekday-chip"><input type="checkbox" value="3"><span>Ср</span></label>
        <label class="weekday-chip"><input type="checkbox" value="4"><span>Чт</span></label>
        <label class="weekday-chip"><input type="checkbox" value="5"><span>Пт</span></label>
        <label class="weekday-chip"><input type="checkbox" value="6"><span>Сб</span></label>
        <label class="weekday-chip"><input type="checkbox" value="0"><span>Вс</span></label>
      </div>
    </div>
    <div class="input-group">
      <label>Напоминание</label>
      <div class="reminder-row">
        <select id="reminderCount">
          <option value="0">Выкл</option>
          <option value="1" selected>1 раз</option>
          <option value="2">2 раза</option>
          <option value="3">3 раза</option>
        </select>
        <select id="reminderBefore">
          <option value="1">за 1 мин</option>
          <option value="5" selected>за 5 мин</option>
          <option value="10">за 10 мин</option>
          <option value="15">за 15 мин</option>
          <option value="30">за 30 мин</option>
        </select>
      </div>
    </div>
  </div>
  <div class="saveContainer">
    <span id="selectedDate" class="selected-date"></span>
    <button id="saveBtn" class="btn btn-primary">Сохранить</button>
  </div>
</div>

<!-- Toast-уведомления -->
<div id="toastContainer" class="toast-container"></div>

<!-- Скрипты (ES-модули) -->
<script type="module" src="scripts/storage.js"></script>
<script type="module" src="scripts/habitManager.js"></script>
<script type="module" src="scripts/calendar.js"></script>
<script type="module" src="scripts/ui.js"></script>
<script type="module" src="scripts/notifications.js"></script>
<script type="module" src="scripts/main.js"></script>
</body>
</html>
